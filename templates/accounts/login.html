{% extends 'base.html' %}
{% load static %}
{% block title %}Login - ShopEasy{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 animate-scaleIn">
            <div class="card shadow-sm" style="border-radius:var(--radius-lg);overflow:hidden;">
                <div class="text-center py-4" style="background:var(--gradient-hero);">
                    <i class="bi bi-person-circle" style="font-size:3rem;color:var(--primary);"></i>
                    <h4 class="text-white mt-2 fw-bold">Welcome Back</h4>
                    <p style="color:rgba(255,255,255,0.6);font-size:0.85rem;">Login to access your account</p>
                </div>
                <div class="card-body p-4">
                    {% if form.errors %}
                    <div class="alert alert-danger" style="border-radius:10px;">
                        <i class="bi bi-exclamation-triangle me-1"></i> Invalid username or password.
                    </div>
                    {% endif %}
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-600" style="font-weight:600;font-size:0.9rem;">Username</label>
                            <div class="input-group">
                                <span class="input-group-text" style="background:var(--bg-light);border-color:#E2E8F0;"><i class="bi bi-person" style="color:var(--primary);"></i></span>
                                <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-600" style="font-weight:600;font-size:0.9rem;">Password</label>
                            <div class="input-group">
                                <span class="input-group-text" style="background:var(--bg-light);border-color:#E2E8F0;"><i class="bi bi-lock" style="color:var(--primary);"></i></span>
                                <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Login
                        </button>
                    </form>
                    <p class="text-center mt-4 mb-0" style="font-size:0.9rem;">
                        Don't have an account? <a href="{% url 'signup' %}" style="color:var(--primary);font-weight:600;">Sign Up</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
